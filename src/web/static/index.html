<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OJ Problem Tracker</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="title-row">
        <h1>OJ Problem Tracker</h1>
        <a
          class="title-repo-link"
          href="https://github.com/pigstd/oj-problem-tracker"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="View source on GitHub"
          title="View source on GitHub"
          data-i18n-aria-label="title.githubLink"
          data-i18n-title="title.githubLink"
        >
          <svg
            class="title-repo-icon"
            viewBox="0 0 16 16"
            width="18"
            height="18"
            aria-hidden="true"
          >
            <path
              fill="currentColor"
              d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
              -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2
              -3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.5
              7.5 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82
              2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0
              .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
            />
          </svg>
          <span class="sr-only" data-i18n="title.githubRepository">GitHub repository</span>
        </a>
        <div
          class="language-switch"
          role="group"
          aria-label="Language"
          data-i18n-aria-label="language.switchLabel"
        >
          <button class="language-option active" type="button" data-language="en" aria-pressed="true">
            English
          </button>
          <button class="language-option" type="button" data-language="zh-CN" aria-pressed="false">
            中文
          </button>
        </div>
      </header>

      <main class="content-grid">
        <section class="panel input-panel">
          <div class="panel-header">
            <h2 data-i18n="panel.input">Input</h2>
            <button
              id="submit-button"
              class="submit-button panel-submit-button"
              type="submit"
              form="check-form"
              data-i18n="action.startCheck"
            >
              Start Check
            </button>
          </div>

          <form id="check-form" class="check-form">
            <fieldset class="field-block oj-fieldset">
              <legend data-i18n="field.oj">OJ</legend>
              <label class="oj-option">
                <input type="radio" name="oj" value="atcoder" checked />
                <span>AtCoder</span>
              </label>
              <label class="oj-option">
                <input type="radio" name="oj" value="cf" />
                <span>Codeforces</span>
              </label>
            </fieldset>

            <div class="field-block">
              <label class="field-label" for="group-select" data-i18n="field.group">Group</label>
              <div class="group-row">
                <select id="group-select" name="group"></select>
                <button id="group-view-button" class="secondary-button" type="button" data-i18n="action.view">View</button>
                <button id="group-edit-button" class="secondary-button" type="button" data-i18n="action.edit">Edit</button>
              </div>
              <div class="group-actions">
                <button id="group-new-button" class="tertiary-button" type="button" data-i18n="action.new">New</button>
                <button id="group-import-button" class="tertiary-button" type="button" data-i18n="action.importJson">Import JSON</button>
                <button id="group-delete-button" class="tertiary-button" type="button" data-i18n="action.delete">Delete</button>
              </div>
              <input id="group-import-input" type="file" accept=".json,application/json" hidden />
            </div>

            <div class="field-block">
              <label class="field-label" for="contest-input" data-i18n="field.contestToken">Contest Token</label>
              <textarea
                id="contest-input"
                name="contest"
                rows="4"
                placeholder="abc403 abc404-abc406&#10;or&#10;2065 2067-2070"
                data-i18n-placeholder="field.contestPlaceholder"
              ></textarea>
            </div>

            <fieldset id="cf-contest-type-fieldset" class="field-block contest-type-fieldset" hidden>
              <legend class="sr-only" data-i18n="field.contestType">Contest Type</legend>
              <button
                id="contest-type-toggle"
                class="contest-type-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="contest-type-panel"
              >
                <span id="contest-type-toggle-label" class="contest-type-toggle-label">
                  Choose contest type (6 selected)
                </span>
                <span class="contest-type-toggle-indicator" aria-hidden="true"></span>
              </button>
              <div id="contest-type-panel" class="contest-type-panel" hidden>
                <div class="contest-type-heading">
                  <div class="contest-type-actions">
                    <button id="contest-type-select-all" class="tertiary-button" type="button" data-i18n="action.selectAll">
                      Select all
                    </button>
                    <button id="contest-type-clear-all" class="tertiary-button" type="button" data-i18n="action.clearAll">
                      Clear all
                    </button>
                  </div>
                </div>
                <div class="contest-type-grid-shell">
                  <div class="contest-type-grid">
                    <label class="contest-type-option">
                      <input type="checkbox" name="contest_types" value="div1" checked />
                      <span>Div. 1</span>
                    </label>
                    <label class="contest-type-option">
                      <input type="checkbox" name="contest_types" value="div2" checked />
                      <span>Div. 2</span>
                    </label>
                    <label class="contest-type-option">
                      <input type="checkbox" name="contest_types" value="div1+2" checked />
                      <span>Div. 1 + 2</span>
                    </label>
                    <label class="contest-type-option">
                      <input type="checkbox" name="contest_types" value="div3" checked />
                      <span>Div. 3</span>
                    </label>
                    <label class="contest-type-option">
                      <input type="checkbox" name="contest_types" value="div4" checked />
                      <span>Div. 4</span>
                    </label>
                    <label class="contest-type-option">
                      <input type="checkbox" name="contest_types" value="others" checked />
                      <span>Others</span>
                    </label>
                  </div>
                </div>
              </div>
            </fieldset>

            <label class="refresh-toggle" for="refresh-cache">
              <input type="checkbox" id="refresh-cache" name="refresh_cache" />
              <span data-i18n="field.forceRefreshCache">Force refresh cache</span>
            </label>
          </form>

          <div id="group-notice" class="notice warning" hidden></div>
          <div id="form-error" class="notice error" hidden></div>
        </section>

        <section class="panel log-panel">
          <div class="panel-header">
            <h2 data-i18n="panel.log">Log</h2>
            <span id="run-status" class="status-pill idle">Idle</span>
          </div>

          <ol id="event-feed" class="log-feed"></ol>
        </section>

        <section class="panel result-panel">
          <div class="panel-header">
            <h2 data-i18n="panel.result">Result</h2>
          </div>

          <div id="contest-results" class="result-list empty-state">
            Expanded contest results will show up here.
          </div>
        </section>
      </main>
    </div>

    <div id="group-modal" class="modal-shell" hidden>
      <div id="group-modal-backdrop" class="modal-backdrop"></div>
      <section
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="group-modal-title"
      >
        <div class="modal-header">
          <div>
            <p id="group-modal-kicker" class="modal-kicker" data-i18n="modal.groupDetail">Group Detail</p>
            <h2 id="group-modal-title">Group</h2>
          </div>
          <button
            id="group-modal-close"
            class="icon-button"
            type="button"
            aria-label="Close group detail"
            data-i18n-aria-label="modal.closeGroupDetail"
            data-i18n="action.close"
          >
            Close
          </button>
        </div>
        <div id="group-modal-content" class="modal-content"></div>
        <div id="group-modal-actions" class="modal-actions"></div>
      </section>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
